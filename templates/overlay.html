<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: transparent;
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
        }

        #bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: rgba(16, 24, 48, 0.92);
            display: flex;
            align-items: center;
            padding: 0 32px;
            border-top: 2px solid #333;
            transition: border-color 0.5s, opacity 0.6s;
        }

        #bar.connected { border-top-color: #ff6b00; }
        #bar.hidden { opacity: 0; pointer-events: none; }

        .team {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .team-info { display: flex; flex-direction: column; gap: 1px; }

        .team-club {
            font-size: 0.62rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .team-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .team-fouls {
            font-size: 0.78rem;
            color: #aaaaaa;
            font-weight: 500;
        }

        .team-fouls.bonus {
            color: #ff0000;
            font-weight: 700;
        }

        .away {
            flex-direction: row-reverse;
            text-align: right;
        }

        .away .team-info { align-items: flex-end; }

        .scoreboard {
            display: flex;
            align-items: center;
            padding: 0 24px;
        }

        .score {
            font-size: 2.4rem;
            font-weight: 800;
            color: #ffffff;
            width: 72px;
            text-align: center;
            line-height: 1;
        }

        .divider {
            font-size: 2rem;
            color: #444;
            font-weight: 300;
            padding: 0 4px;
        }

        .center-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
            margin: 0 16px;
            gap: 1px;
        }

        .period-label {
            font-size: 0.62rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .period-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ff6b00;
        }

        .clock-value {
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff;
        }

        .clock-value.stopped { color: #888; }

        .pioneer-accent {
            width: 4px;
            height: 40px;
            background: #ff6b00;
            border-radius: 2px;
            margin-right: 16px;
            flex-shrink: 0;
        }

        #timeout-popup, #foul-popup {
            position: absolute;
            bottom: 88px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 4px;
            color: white;
            font-size: 0.95rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            white-space: nowrap;
            pointer-events: none;
        }

        #timeout-popup {
            background: rgba(16, 24, 48, 0.95);
            border-left: 4px solid #ff0000;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        #timeout-popup.visible {
            opacity: 1;
            animation: flash 0.8s infinite;
        }

        #foul-popup {
            background: rgba(16, 24, 48, 0.95);
            border-left: 4px solid #ff6b00;
        }

        #foul-popup.visible { opacity: 1; }

        @keyframes flash {
            0%   { opacity: 1; }
            50%  { opacity: 0.3; }
            100% { opacity: 1; }
        }

        #final {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(16, 24, 48, 0.95);
            padding: 20px 40px 24px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s;
        }

        #final.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .final-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #333;
        }

        .match-result {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .result-team { text-align: center; }

        .result-club {
            font-size: 0.62rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .result-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
        }

        .result-score {
            font-size: 2.8rem;
            font-weight: 800;
            color: #ff6b00;
            padding: 0 16px;
        }

        .result-label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            text-align: center;
        }

        .final-badge {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: #ff6b00;
            border: 1px solid #ff6b00;
            padding: 3px 10px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .tables { display: flex; gap: 32px; }
        .team-table { flex: 1; }

        .table-header {
            font-size: 0.68rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid #222;
        }

        .table-header span { color: #ff6b00; font-weight: 700; }

        table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }

        thead th {
            color: #666;
            font-weight: 500;
            text-align: left;
            padding: 3px 6px;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        thead th.num { text-align: right; }
        tbody tr { border-top: 1px solid #1a1a2e; }
        td { padding: 4px 6px; color: #cccccc; }
        td.jersey { color: #888; width: 32px; font-size: 0.75rem; }
        td.name { color: #ffffff; font-weight: 500; }
        td.name.captain::after { content: " ©"; color: #ff6b00; font-size: 0.7rem; }
        td.num { text-align: right; font-variant-numeric: tabular-nums; width: 40px; }
        td.points { color: #ffffff; font-weight: 700; }
        td.fouls.warning { color: #ff6b00; font-weight: 600; }
    </style>
</head>
<body>

<div id="bar">
    <div class="pioneer-accent"></div>

    <div class="team home">
        <img id="home-logo" src="" style="height:40px; width:40px; object-fit:contain; display:none;">
        <div class="team-info">
            <div class="team-club" id="home-club"></div>
            <div class="team-name" id="home-name">—</div>
            <div class="team-fouls" id="home-fouls">fouten: 0</div>
        </div>
    </div>

    <div class="scoreboard">
        <div class="score" id="home-score">0</div>
        <div class="divider">—</div>
        <div class="center-wrap">
            <div class="period-label">kwart</div>
            <div class="period-value" id="period">—</div>
            <div class="period-label" style="margin-top:3px">tijd</div>
            <div class="clock-value" id="clock">—</div>
        </div>
        <div class="divider">—</div>
        <div class="score" id="away-score">0</div>
    </div>

    <div class="team away">
        <img id="away-logo" src="" style="height:40px; width:40px; object-fit:contain; display:none;">
        <div class="team-info">
            <div class="team-club" id="away-club"></div>
            <div class="team-name" id="away-name">—</div>
            <div class="team-fouls" id="away-fouls">fouten: 0</div>
        </div>
    </div>
</div>

<div id="timeout-popup"></div>
<div id="foul-popup"></div>

<div id="final">
    <div class="final-header">
        <div style="display:flex; align-items:center;">
            <div class="pioneer-accent"></div>
            <div class="match-result">
                <div class="result-team">
                    <div class="result-club" id="f-home-club"></div>
                    <div class="result-name" id="f-home-name">—</div>
                </div>
                <div>
                    <div class="result-label">eindstand</div>
                    <div class="result-score">
                        <span id="f-home-score">0</span>
                        <span style="color:#444; font-weight:300"> — </span>
                        <span id="f-away-score">0</span>
                    </div>
                </div>
                <div class="result-team">
                    <div class="result-club" id="f-away-club"></div>
                    <div class="result-name" id="f-away-name">—</div>
                </div>
            </div>
        </div>
        <div class="final-badge">Final</div>
    </div>

    <div class="tables">
        <div class="team-table">
            <div class="table-header">Thuis — <span id="f-home-table-name"></span></div>
            <table>
                <thead>
                    <tr>
                        <th>#</th><th>Speler</th>
                        <th class="num">Pts</th>
                        <th class="num">3pt</th>
                        <th class="num">Ftn</th>
                    </tr>
                </thead>
                <tbody id="home-tbody"></tbody>
            </table>
        </div>
        <div class="team-table">
            <div class="table-header">Gasten — <span id="f-away-table-name"></span></div>
            <table>
                <thead>
                    <tr>
                        <th>#</th><th>Speler</th>
                        <th class="num">Pts</th>
                        <th class="num">3pt</th>
                        <th class="num">Ftn</th>
                    </tr>
                </thead>
                <tbody id="away-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let lastFoul = null;
    let popupTimeout = null;
    let timeoutTimer = null;
    let lastHomeTimeouts = 0;
    let lastAwayTimeouts = 0;
    let currentState = {};

    function periodLabel(id) {
        const map = { 14: "1", 15: "2", 16: "3", 17: "4" };
        return map[id] || id || "—";
    }

    function showFoulPopup(foul) {
        const popup = document.getElementById("foul-popup");
        popup.textContent = `Fout: ${foul.player} (#${foul.jersey}) — ${foul.code}`;
        popup.classList.add("visible");
        clearTimeout(popupTimeout);
        popupTimeout = setTimeout(() => popup.classList.remove("visible"), 4000);
    }

    function startTimeoutFlash(team) {
        const toPopup = document.getElementById("timeout-popup");
        const name = team === "home"
            ? (currentState.home_club || currentState.home_name || "THUIS")
            : (currentState.away_club || currentState.away_name || "GASTEN");
        toPopup.textContent = `TIME OUT — ${name.toUpperCase()}`;
        toPopup.classList.add("visible");
        clearTimeout(timeoutTimer);
        timeoutTimer = setTimeout(() => toPopup.classList.remove("visible"), 60000);
    }

    function buildRows(players, tbodyId) {
        const tbody = document.getElementById(tbodyId);
        tbody.innerHTML = "";
        players.sort((a, b) => b.points - a.points);
        players.forEach(p => {
            if (p.points === 0 && p.fouls === 0) return;
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td class="jersey">${p.jersey ?? "—"}</td>
                <td class="name${p.captain ? " captain" : ""}">${p.name}</td>
                <td class="num points">${p.points}</td>
                <td class="num">${p.threes > 0 ? p.threes : "—"}</td>
                <td class="num fouls${p.fouls >= 4 ? " warning" : ""}">${p.fouls > 0 ? p.fouls : "—"}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function update() {
        try {
            const res = await fetch("/api/state");
            const s = await res.json();
            currentState = s;

            const isFinal = s.status === "Final";

            document.getElementById("bar").classList.toggle("hidden", isFinal);
            document.getElementById("final").classList.toggle("visible", isFinal);

            if (isFinal) {
                const playersRes = await fetch("/api/players");
                const players = await playersRes.json();

                document.getElementById("f-home-name").textContent  = s.home_name || "—";
                document.getElementById("f-away-name").textContent  = s.away_name || "—";
                document.getElementById("f-home-club").textContent  = s.home_club || "";
                document.getElementById("f-away-club").textContent  = s.away_club || "";
                document.getElementById("f-home-score").textContent = s.home_score ?? 0;
                document.getElementById("f-away-score").textContent = s.away_score ?? 0;
                document.getElementById("f-home-table-name").textContent = s.home_name || "";
                document.getElementById("f-away-table-name").textContent = s.away_name || "";

                buildRows(players.filter(p => p.team === "home"), "home-tbody");
                buildRows(players.filter(p => p.team === "away"), "away-tbody");

            } else {
                // live scorebar
                document.getElementById("home-club").textContent   = s.home_club || "";
                document.getElementById("away-club").textContent   = s.away_club || "";
                document.getElementById("home-name").textContent   = s.home_name || "—";
                document.getElementById("away-name").textContent   = s.away_name || "—";

                // SCORE — Anatec when connected, FOYS as fallback
                const homeScore = s.anatec_connected ? s.anatec_home_score : s.home_score;
                const awayScore = s.anatec_connected ? s.anatec_guest_score : s.away_score;
                document.getElementById("home-score").textContent  = homeScore ?? 0;
                document.getElementById("away-score").textContent  = awayScore ?? 0;

                 // PERIOD — Anatec when connected, FOYS as fallback
                const period = s.anatec_connected ? s.anatec_period : s.period;
                document.getElementById("period").textContent = s.status === "Final" ? "FINAL" :
                s.anatec_connected ? (period || "—") : periodLabel(period);

                // CLOCK — always Anatec
                const clockEl = document.getElementById("clock");
                clockEl.textContent  = s.anatec_clock ?? "—";
                clockEl.className    = "clock-value" + (s.anatec_clock_running ? "" : " stopped");

                // FOULS — Anatec when connected, FOYS as fallback
                const homeFouls = s.anatec_connected ? s.anatec_home_fouls : s.home_fouls;
                const awayFouls = s.anatec_connected ? s.anatec_guest_fouls : s.away_fouls;
                const homeBonus = homeFouls >= 4;
                const awayBonus = awayFouls >= 4;

                const hf = document.getElementById("home-fouls");
                hf.textContent = `fouten: ${homeFouls}`;
                hf.className   = "team-fouls" + (homeBonus ? " bonus" : "");

                const af = document.getElementById("away-fouls");
                af.textContent = `fouten: ${awayFouls}`;
                af.className   = "team-fouls" + (awayBonus ? " bonus" : "");

                // TIMEOUTS — Anatec flag when connected, FOYS count as fallback
                if (s.anatec_connected) {
                    const toPopup = document.getElementById("timeout-popup");
                    if (s.anatec_timeout) {
                        startTimeoutFlash(s.anatec_timeout);
                    } else {
                        toPopup.classList.remove("visible");
                        clearTimeout(timeoutTimer);
                    }
                } else {
                    const ht = s.home_timeouts ?? 0;
                    const at = s.away_timeouts ?? 0;
                    if (ht > lastHomeTimeouts) startTimeoutFlash("home");
                    if (at > lastAwayTimeouts) startTimeoutFlash("away");
                    lastHomeTimeouts = ht;
                    lastAwayTimeouts = at;
}

                // LOGOS
                const homeLogo = document.getElementById("home-logo");
                if (s.home_logo) {
                    homeLogo.src = s.home_logo;
                    homeLogo.style.display = "block";
                }
                const awayLogo = document.getElementById("away-logo");
                if (s.away_logo) {
                    awayLogo.src = s.away_logo;
                    awayLogo.style.display = "block";
                }

                // FOUL POPUP — always FOYS
                if (s.last_foul && JSON.stringify(s.last_foul) !== JSON.stringify(lastFoul)) {
                    lastFoul = s.last_foul;
                    showFoulPopup(s.last_foul);
                }

                // CONNECTION INDICATOR
                document.getElementById("bar").classList.toggle("connected", s.anatec_connected);
            }

        } catch (e) {
            console.error("State fetch error:", e);
        }
    }

    update();
    setInterval(update, 3000);
</script>

</body>
</html>
