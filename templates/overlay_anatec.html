<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
        }

        #bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: rgba(16, 24, 48, 0.92);
            display: flex;
            align-items: center;
            padding: 0 32px;
            border-top: 2px solid #333;
            transition: border-color 0.5s;
        }

        #bar.connected {
            border-top-color: #ff6b00;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .team-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .team-fouls {
            font-size: 0.8rem;
            color: #aaaaaa;
            font-weight: 500;
        }

        .team-fouls.bonus {
            color: #ff6b00;
            font-weight: 700;
        }

        .away {
            flex-direction: row-reverse;
            text-align: right;
        }

        .scoreboard {
            display: flex;
            align-items: center;
            padding: 0 24px;
        }

        .score {
            font-size: 2.4rem;
            font-weight: 800;
            color: #ffffff;
            width: 72px;
            text-align: center;
            line-height: 1;
        }

        .divider {
            font-size: 2rem;
            color: #444;
            font-weight: 300;
            padding: 0 4px;
        }

        .center-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
            margin: 0 16px;
            gap: 2px;
        }

        .period-label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .period-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ff6b00;
        }

        .clock-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #ffffff;
        }

        .clock-value.running {
            color: #ffffff;
        }

        .clock-value.stopped {
            color: #888;
        }

        #foul-popup {
            position: absolute;
            bottom: 88px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 24, 48, 0.95);
            border-left: 4px solid #ff6b00;
            padding: 10px 20px;
            border-radius: 4px;
            color: white;
            font-size: 0.95rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            white-space: nowrap;
        }

        #foul-popup.visible {
            opacity: 1;
        }

        .pioneer-accent {
            width: 4px;
            height: 40px;
            background: #ff6b00;
            border-radius: 2px;
            margin-right: 16px;
        }

        #no-signal {
            position: absolute;
            bottom: 80px;
            right: 32px;
            color: #888;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #no-signal.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

<div id="bar">
    <div class="pioneer-accent"></div>

    <!-- Home team -->
    <div class="team home">
        <div class="team-name" id="home-name">—</div>
        <div class="team-fouls" id="home-fouls">fouten: 0</div>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard">
        <div class="score" id="home-score">0</div>
        <div class="divider">—</div>
        <div class="center-wrap">
            <div class="period-label">kwart</div>
            <div class="period-value" id="period">—</div>
            <div class="period-label">tijd</div>
            <div class="clock-value" id="clock">10:00</div>
        </div>
        <div class="divider">—</div>
        <div class="score" id="away-score">0</div>
    </div>

    <!-- Away team -->
    <div class="team away">
        <div class="team-name" id="away-name">—</div>
        <div class="team-fouls" id="away-fouls">fouten: 0</div>
    </div>
</div>

<div id="foul-popup"></div>
<div id="no-signal">⚠ geen verbinding</div>

<script>
    let lastFoul = null;
    let popupTimeout = null;

    function periodLabel(id) {
        const map = { 1: "1", 2: "2", 3: "3", 4: "4" };
        return map[id] || id || "—";
    }

    function showFoulPopup(foul) {
        const popup = document.getElementById("foul-popup");
        popup.textContent = `Fout: ${foul.player} (#${foul.jersey}) — ${foul.code}`;
        popup.classList.add("visible");
        clearTimeout(popupTimeout);
        popupTimeout = setTimeout(() => popup.classList.remove("visible"), 4000);
    }

    async function update() {
        try {
            const res = await fetch("/api/state");
            const s = await res.json();

            // Team names from FOYS (if available)
            document.getElementById("home-name").textContent = s.home_name || "Thuis";
            document.getElementById("away-name").textContent = s.away_name || "Uit";

            // Scores from Anatec
            document.getElementById("home-score").textContent = s.anatec_home_score ?? 0;
            document.getElementById("away-score").textContent = s.anatec_guest_score ?? 0;

            // Period from Anatec
            document.getElementById("period").textContent = periodLabel(s.anatec_period);

            // Clock from Anatec
            const clockEl = document.getElementById("clock");
            clockEl.textContent = s.anatec_clock ?? "—";
            clockEl.className = "clock-value " + (s.anatec_clock_running ? "running" : "stopped");

            // Fouls from Anatec
            const hf = document.getElementById("home-fouls");
            hf.textContent = `fouten: ${s.anatec_home_fouls ?? 0}`;
            hf.className = "team-fouls" + (s.anatec_home_fouls >= 4 ? " bonus" : "");

            const af = document.getElementById("away-fouls");
            af.textContent = `fouten: ${s.anatec_guest_fouls ?? 0}`;
            af.className = "team-fouls" + (s.anatec_guest_fouls >= 4 ? " bonus" : "");

            // Connection indicator
            const bar = document.getElementById("bar");
            bar.className = s.anatec_connected ? "connected" : "";

            const noSignal = document.getElementById("no-signal");
            noSignal.className = s.anatec_connected ? "" : "visible";

            // Foul popup from FOYS
            if (s.last_foul && JSON.stringify(s.last_foul) !== JSON.stringify(lastFoul)) {
                lastFoul = s.last_foul;
                showFoulPopup(s.last_foul);
            }

        } catch (e) {
            console.error("State fetch error:", e);
        }
    }

    update();
    setInterval(update, 1000);
</script>

</body>
</html>
